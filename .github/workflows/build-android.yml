name: Build Android Executable

on:
  workflow_dispatch:
    inputs:
      release_build:
        description: 'Build release binaries for Android'
        required: false
        default: 'true'

jobs:
  build-android:
    name: Build for ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: aarch64-linux-android
            arch: arm64-v8a
          - target: armv7-linux-androideabi
            arch: armeabi-v7a
          - target: x86_64-linux-android
            arch: x86_64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Android NDK
        uses: nvim-treesitter/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Android Binary with Cargo NDK
        run: cargo ndk -t ${{ matrix.arch }} -o ./dist build --release

      - name: Prepare Artifact
        run: |
          mkdir -p ./artifacts
          cp ./dist/${{ matrix.arch }}/lyric_forger ./artifacts/lyric_forger-${{ matrix.target }}

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lyric_forger-${{ matrix.target }}
          path: ./artifacts/lyric_forger-${{ matrix.target }}
